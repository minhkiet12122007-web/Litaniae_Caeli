<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Posts - Litaniae Caeli</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        .posts-wrapper {
            padding: 160px 8vw 100px 8vw;
            max-width: 1200px;
            margin: 0 auto;
        }

        .posts-header {
            margin-bottom: 80px;
            border-bottom: 1px solid rgba(13, 13, 13, 0.1);
            padding-bottom: 40px;
        }

        .posts-header h1 {
            font-family: 'EB Garamond', serif;
            font-size: 4vw;
            font-weight: 400;
            color: #1A4332;
        }

        .post-magazine-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
        }

        .post-magazine-card {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(13, 13, 13, 0.06);
            padding-bottom: 30px;
        }

        .post-meta-date {
            font-family: monospace;
            font-size: 11px;
            color: #888888;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .post-magazine-title {
            font-family: 'EB Garamond', serif;
            font-size: 24px;
            line-height: 1.3;
            margin-bottom: 15px;
            color: #0D0D0D;
        }

        .post-magazine-excerpt {
            font-size: 14px;
            line-height: 1.6;
            color: #555555;
            font-weight: 300;
            margin-bottom: 25px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: justify;
        }

        .btn-read-fb {
            align-self: flex-start;
            font-family: monospace;
            font-size: 11px;
            color: #0D0D0D;
            text-decoration: none;
            border: 1px solid #0D0D0D;
            padding: 10px 20px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-read-fb:hover {
            background-color: #0D0D0D;
            color: #FAF9F6;
        }

        @media (max-width: 768px) {
            .post-magazine-grid {
                grid-template-columns: 1fr;
            }

            .posts-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>
    <div class="custom-cursor" id="cursor"></div>

    <a href="index.html" class="close-fixed-zone hover-target" data-hover="VỀ TRANG CHỦ"
        style="text-decoration: none; text-align: center;">✕ TRANG CHỦ</a>

    <div class="posts-wrapper">
        <div class="posts-header">
            <p class="section-tag">// POSTS</p>
            <h1>Các bài viết mới nhất</h1>
        </div>

        <div class="post-magazine-grid" id="posts-container">
        </div>
    </div>

    <script src="posts_data.js"></script>
    <script src="script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const container = document.getElementById("posts-container");

            // data_posts lấy trực tiếp từ file posts_data.js nên không bao giờ bị lỗi CORS
            if (typeof data_posts !== "undefined" && data_posts.length > 0) {
                container.innerHTML = ""; // Xóa rỗng container

                data_posts.forEach(post => {
                    const card = document.createElement("div");
                    card.className = "post-magazine-card";

                    card.innerHTML = `
                        <div class="post-meta-date">POSTED ON: ${post.date}</div>
                        <h2 class="post-magazine-title">${post.title}</h2>
                        <p class="post-magazine-excerpt">${post.excerpt}</p>
                        <a href="${post.url}" target="_blank" class="btn-read-fb hover-target" data-hover="FACEBOOK">ĐỌC TRÊN FACEBOOK ↗</a>
                    `;

                    container.appendChild(card);
                });

                // Gọi lại hiệu ứng chuột của bạn nếu có
                if (typeof initCursor === "function") {
                    initCursor();
                }
            } else {
                container.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: #888; font-family: sans-serif;">Hiện tại chưa có dữ liệu bài viết mới.</p>`;
            }
        });
    </script>
</body>

</html>
